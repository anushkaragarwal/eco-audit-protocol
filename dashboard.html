<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EcoAudit Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-bg">

<div class="dashboard">

    <div class="box">

        <h2>Company Audit</h2>

        <select id="company">
            <option value="Tesla">Tesla</option>
            <option value="Shell">Shell</option>
            <option value="Adani">Adani</option>
        </select>

        <br><br>

        <button onclick="getScore()">Get ESG Score</button>

        <p id="loading" style="display:none;">Loading...</p>

        <h3 id="score">ESG Score: --</h3>
        <p id="status"></p>

        <div class="bar">
            <div id="progress"></div>
        </div>

        <br>

        <button onclick="detect()">Detect Violation</button>

        <h3 id="interest">Interest Rate: --</h3>

        <p id="reason"></p>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
