<!DOCTYPE html>
<html>
<head>
  <title>EcoAudit Dashboard</title>
</head>

<body style="font-family: Arial; padding: 20px;">
  <input type="text" id="companyInput" placeholder="Enter company name" />
<button onclick="analyzeCompany()">Analyze</button>

<pre id="result"></pre>

<script>
async function analyzeCompany() {
    const company = document.getElementById("companyInput").value;

    const response = await fetch(`http://127.0.0.1:8000/analyze?company=${company}`);
    const data = await response.json();

    document.getElementById("result").innerText = JSON.stringify(data, null, 2);
}
</script>

  <h1>🌱 EcoAudit Dashboard</h1>
  <button onclick="runAudit()">Run ESG Audit</button>

  <div id="results" style="margin-top:20px;"></div>

  <script>
    async function runAudit() {
      const res = await fetch("http://127.0.0.1:8000/analyze");
      const data = await res.json();

      let html = "";

      data.forEach(company => {
        let color = company.score < 70 ? "red" : "green";

        html += `
          <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h2>${company.company}</h2>
            <p style="color:${color}; font-weight:bold;">
              ESG Score: ${company.score}
            </p>
            <p>Reason: ${company.reason}</p>
          </div>
        `;
      });

      document.getElementById("results").innerHTML = html;
    }
  </script>

</body>
</html>cd
